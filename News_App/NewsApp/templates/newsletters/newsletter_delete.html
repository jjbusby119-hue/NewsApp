{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Delete Newsletter</h2>
    <p>Are you sure you want to delete the newsletter "{{ newsletter.title }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="negative-btn">Yes, Delete</button>
        <a href="{% url 'newsletter-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
