{% extends 'base.html' %}

{% block title %}Article Lists{% endblock %}

{% block content %}
<h1>Article Lists</h1>

{% if user.is_authenticated and user.role == 'Journalist' %}
    <button><a href="{% url 'article_write' %}">Create New Article</a></button>
{% endif %}

{% for article in articles %}
    <p><a href="{% url 'article-detail' article.pk %}">{{ article.title }}</a></p>
{% endfor %}
{% endblock %}
