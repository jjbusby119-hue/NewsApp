{% extends 'base.html' %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    <h2>Sign Up</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="form-group">
                            <label for="username">Username</label>
                            {{ form.username }}
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            {{ form.email }}
                        </div>

                        <div class="form-group">
                            <label for="password1">Password</label>
                            {{ form.password1 }}
                        </div>

                        <div class="form-group">
                            <label for="password2">Confirm Password</label>
                            {{ form.password2 }}
                        </div>

                        <div class="form-group">
                            <label for="role">Role</label>
                            {{ form.role }}
                        </div>

                        {% if form.errors %}
                        <div class="alert">
                            Please correct the errors.
                            {{ form.errors }}
                        </div>
                        {% endif %}

                        <button type="submit" class="positive-btn">Sign Up</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
